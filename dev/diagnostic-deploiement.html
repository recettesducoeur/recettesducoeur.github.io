<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diagnostic déploiement — Les Recettes du Cœur</title>
  <meta name="description" content="Diagnostic technique du déploiement GitHub Pages.">
  <link rel="icon" href="../assets/logos/favicon.ico">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script defer src="../assets/js/layout.js"></script>
  <script defer src="../assets/js/app.js"></script>
  <script defer src="../assets/js/table-tools-dev.js"></script>
</head>
<body>
  <div data-site-header></div>
  <main id="contenu" class="container dev-page dev-page dev-page">
    <section class="page-card">
      <span class="kicker">🧪 Diagnostic</span>
      <h1>Diagnostic du déploiement</h1>
      <p class="lead">Cette page vérifie que les chemins essentiels fonctionnent depuis la racine GitHub Pages.</p>
      <div id="diagnostic-resultats" class="notice">Tests en cours…</div>
    </section>
  </main>
  <div data-site-footer></div>
  <script>
    const fichiers = [
      "assets/css/style.css",
      "assets/js/layout.js",
      "assets/js/app.js",
      "assets/js/search.js",
      "assets/logos/logo-principal.png",
      "data/recettes.json",
      "images/recettes/20000101-001.webp",
      "qrcodes/site.png",
      "pdf/recettes/20000101-001.pdf",
      "suggerer-recette.html",
      "assets/images/site/suggerer-recette-boite-a-idees.webp",
      "assets/images/site/suggerer-recette-ensemble.webp"
    ];

    Promise.all(fichiers.map(async f => {
      try {
        const r = await fetch(f, { cache: "no-store" });
        return { fichier: f, ok: r.ok, status: r.status };
      } catch (e) {
        return { fichier: f, ok: false, status: "erreur" };
      }
    })).then(results => {
      const ok = results.every(x => x.ok);
      document.getElementById("diagnostic-resultats").innerHTML =
        `<strong>${ok ? "✅ Tous les chemins essentiels répondent." : "❌ Certains fichiers ne répondent pas."}</strong>` +
        "<ul>" + results.map(x => `<li>${x.ok ? "✅" : "❌"} <code>${x.fichier}</code> — ${x.status}</li>`).join("") + "</ul>";
    });
  </script>
</body>
</html>
