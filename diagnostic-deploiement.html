<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diagnostic déploiement — Les Recettes du Cœur</title>
  <link rel="icon" href="assets/logos/favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css">
  <script defer src="assets/js/app.js"></script>
</head>
<body>
  <main class="container">
    <section class="page-card">
      <span class="kicker">🧪 Diagnostic</span>
      <h1>Diagnostic du déploiement</h1>
      <p class="lead">Cette page vérifie que les chemins essentiels du site fonctionnent depuis la racine GitHub Pages.</p>
      <div id="diagnostic-resultats" class="notice">Tests en cours…</div>
      <div class="actions">
        <a class="button" href="index.html">Accueil</a>
        <a class="button secondary" href="recette-semaine.html">Recette de la semaine</a>
      </div>
    </section>
  </main>

  <script>
    const fichiers = [
      "assets/css/style.css",
      "assets/js/app.js",
      "assets/logos/logo-principal.png",
      "data/recettes.json",
      "images/recettes/20000101-001.webp",
      "qrcodes/site.png"
    ];

    Promise.all(fichiers.map(async f => {
      try {
        const r = await fetch(f, { cache: "no-store" });
        return { fichier: f, ok: r.ok, status: r.status };
      } catch (e) {
        return { fichier: f, ok: false, status: "erreur" };
      }
    })).then(results => {
      const ok = results.every(x => x.ok);
      document.getElementById("diagnostic-resultats").innerHTML =
        `<strong>${ok ? "✅ Tous les chemins essentiels répondent." : "❌ Certains fichiers ne répondent pas."}</strong>` +
        "<ul>" + results.map(x => `<li>${x.ok ? "✅" : "❌"} <code>${x.fichier}</code> — ${x.status}</li>`).join("") + "</ul>" +
        "<p>Si le CSS ne s'affiche pas, vérifiez que les dossiers <code>assets/</code>, <code>data/</code>, <code>images/</code> et <code>qrcodes/</code> sont bien à la racine du dépôt.</p>";
    });
  </script>
</body>
</html>
